# TEKNOPLAST — Nginx konfiguratsiyasi
# Joylash: /etc/nginx/sites-available/teknoplast
# Faollashtirish: ln -s /etc/nginx/sites-available/teknoplast /etc/nginx/sites-enabled/
# Domeningizni "teknoplast.uz" o'rniga yozing. SSL'ni certbot avtomatik qo'shadi.

server {
    listen 80;
    server_name teknoplast.uz www.teknoplast.uz;

    # Frontend (React build — dist papkasi)
    root /var/www/teknoplast/frontend/dist;
    index index.html;

    # Fayl yuklash hajmi (rasm/PDF uchun)
    client_max_body_size 20M;

    # API so'rovlari → Node backend (port 5000)
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # React Router (SPA) — barcha yo'llar index.html'ga
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statik fayllar kesh
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
