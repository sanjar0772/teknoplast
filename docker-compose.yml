version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teknoplast-db
    environment:
      POSTGRES_DB: teknoplast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-teknoplast123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: teknoplast-backend
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      NODE_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: teknoplast-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

volumes:
  postgres_data:
